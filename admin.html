<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | ClaimIT</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .navbar-app-logo { width:38px; height:38px; object-fit:contain; }
        .navbar-title-sub { color:#003d7a; font-weight:700; }
        .logout-btn { background:none; border:none; color:#d9242e; font-size:20px; cursor:pointer; padding:6px; border-radius:6px; transition:background 0.2s; }
        .logout-btn:hover { background:#f8d7da; }
        .admin_name { color:#333; font-weight:600; font-size:14px; margin-right:8px; }
        .navbar-profile { display:flex; align-items:center; }

        /* stat boxes row */
        .stat-boxes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: white;
            border-radius: 12px;
            padding: 22px 24px;
            box-shadow: 0 2px 8px rgba(0,61,122,0.08);
            border-top: 4px solid #d9242e;
        }
        .stat-box.green { border-top-color: #28a745; }
        .stat-box.blue  { border-top-color: #003d7a; }
        .stat-box .label { font-size:12px; color:#888; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
        .stat-box .value { font-size:32px; font-weight:800; color:#003d7a; margin-top:4px; }
        .stat-box.green .value { color:#1a7f37; }

        /* table tweaks */
        .badge { display:inline-block; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; }
        .badge-success { background:#dcfce7; color:#1a7f37; border:1px solid #bbf7d0; }
        .badge-warning { background:#fff0f0; color:#d9242e; border:1px solid #ffd0d2; }

        /* view button opens detail panel */
        .detail-panel {
            display: none;
            position: fixed;
            right: 0; top: 0; bottom: 0;
            width: 420px;
            background: white;
            box-shadow: -4px 0 24px rgba(0,0,0,0.12);
            z-index: 3000;
            overflow-y: auto;
            animation: slidePanel 0.3s ease;
        }
        @keyframes slidePanel { from{transform:translateX(100%)} to{transform:translateX(0)} }
        .detail-panel.open { display:block; }
        .panel-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,0.35); z-index:2999;
        }
        .panel-overlay.open { display:block; }
        .panel-header {
            display:flex; justify-content:space-between; align-items:center;
            padding:20px 24px; border-bottom:2px solid #f0f5ff;
            background:#f8f9fa; position:sticky; top:0; z-index:1;
        }
        .panel-header h3 { color:#003d7a; font-size:17px; font-weight:800; margin:0; }
        .panel-close { background:none; border:none; font-size:24px; color:#999; cursor:pointer; border-radius:6px; padding:2px 6px; }
        .panel-close:hover { background:#f8d7da; color:#d9242e; }
        .panel-img {
            width:100%; height:220px; object-fit:cover; background:#eef2f7;
            display:flex; align-items:center; justify-content:center;
        }
        .panel-img img { width:100%; height:220px; object-fit:contain; padding:16px; }
        .panel-body { padding:20px 24px; }
        .panel-row { margin-bottom:14px; }
        .panel-row label { font-size:10px; font-weight:700; color:#003d7a; text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:3px; }
        .panel-row p { font-size:14px; color:#333; margin:0; line-height:1.5; }
        .panel-actions { display:flex; flex-direction:column; gap:10px; margin-top:20px; padding-top:20px; border-top:1px solid #f0f0f0; }
        .panel-btn { padding:11px 16px; border:none; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s; font-family:inherit; display:flex; align-items:center; gap:8px; justify-content:center; }
        .panel-btn.claim   { background:#003d7a; color:white; }
        .panel-btn.unclaim { background:#6c757d; color:white; }
        .panel-btn.edit    { background:#0066cc; color:white; }
        .panel-btn.archive { background:#d9242e; color:white; }
        .panel-btn:hover   { opacity:0.88; transform:translateY(-1px); }

        /* search bar */
        .search-bar-wrap { position:relative; margin-bottom:16px; }
        .search-bar-wrap i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#aaa; font-size:18px; }
        .search-bar-wrap input { width:100%; padding:12px 14px 12px 44px; border:2px solid #e0e0e0; border-radius:10px; font-size:14px; font-family:inherit; box-sizing:border-box; }
        .search-bar-wrap input:focus { outline:none; border-color:#d9242e; box-shadow:0 0 0 3px rgba(217,36,46,0.1); }

        /* empty state */
        .empty-row td { text-align:center; color:#aaa; padding:40px!important; font-style:italic; font-size:14px; }

        /* product code in table */
        .pc-tag { font-family:monospace; font-size:11px; font-weight:700; padding:2px 7px; border-radius:4px; background:#fff0f0; color:#d9242e; border:1px solid #ffd0d2; }
        .pc-tag.claimed { background:#dcfce7; color:#1a7f37; border-color:#bbf7d0; }
    </style>
</head>
<body>

    <!-- Sidebar injected by JS -->
    <div id="sidebarMount"></div>

    <!-- Navbar injected by JS -->
    <div id="navbarMount"></div>

    <!-- Detail panel overlay -->
    <div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>

    <!-- Item Detail Side Panel -->
    <div class="detail-panel" id="detailPanel">
        <div class="panel-header">
            <h3 id="panelTitle">Item Details</h3>
            <button class="panel-close" onclick="closePanel()"><i class='bx bx-x'></i></button>
        </div>
        <div class="panel-img" id="panelImgWrap"></div>
        <div class="panel-body" id="panelBody"></div>
    </div>

    <!-- Archive Modal -->
    <div id="archiveModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Archive Item</h2>
                <button class="modal-close" onclick="closeArchiveModal()"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body">
                <p>Please provide a reason for archiving this item.</p>
                <textarea id="archiveReason" placeholder="e.g., Item unclaimed for 60+ days, storage limit reached..." style="width:100%;min-height:100px;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;resize:vertical;box-sizing:border-box;"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeArchiveModal()">Cancel</button>
                <button class="btn-archive" id="archiveSubmitBtn">Archive Item</button>
            </div>
        </div>
    </div>

    <!-- Claim Modal -->
    <div id="claimModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Mark as Claimed</h2>
                <button class="modal-close" onclick="closeClaimModal()"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body">
                <div style="margin-bottom:16px;">
                    <label style="display:block;color:#003d7a;font-weight:700;font-size:13px;margin-bottom:6px;">Full Name <span style="color:#d9242e">*</span></label>
                    <input type="text" id="claimerName" placeholder="Enter claimer's full name"
                           style="width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;box-sizing:border-box;">
                </div>
                <div>
                    <label style="display:block;color:#003d7a;font-weight:700;font-size:13px;margin-bottom:6px;">Student / Staff ID <span style="color:#d9242e">*</span></label>
                    <input type="text" id="claimerId" placeholder="e.g., 2020105714"
                           style="width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;box-sizing:border-box;">
                    <small style="color:#888;font-size:12px;display:block;margin-top:6px;">Enter 00000000 for staff</small>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeClaimModal()">Cancel</button>
                <button class="btn-archive" id="claimSubmitBtn" style="background:linear-gradient(135deg,#28a745,#1e7e34);">✓ Confirm Claim</button>
            </div>
        </div>
    </div>

    <section class="home-section">
        <div class="home-content">
            <h2 style="color:#003d7a;margin-bottom:24px;font-size:22px;">Dashboard</h2>

            <!-- STAT BOXES -->
            <div class="stat-boxes" id="statBoxes"></div>

            <!-- FILTERS -->
            <div class="filter-section" style="margin-bottom:20px;">
                <h3>Filters</h3>
                <div class="search-bar-wrap">
                    <i class='bx bx-search'></i>
                    <input type="text" id="searchInput" placeholder="Search by name, code, category, description…">
                </div>
                <div class="filter-row">
                    <div class="filter-group">
                        <label>Category</label>
                        <select id="catFilter">
                            <option value="">All Categories</option>
                            <option>Electronics</option><option>Clothing</option>
                            <option>Accessories</option><option>Books</option>
                            <option>IDs/Cards</option><option>Bags</option>
                            <option>School Supplies</option><option>Sports Equipment</option>
                            <option>Personal Items</option><option>Other</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Status</label>
                        <select id="statusFilter">
                            <option value="">All Status</option>
                            <option>Unclaimed</option>
                            <option>Claimed</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>From Date</label>
                        <input type="date" id="dateFrom">
                    </div>
                    <div class="filter-group">
                        <label>To Date</label>
                        <input type="date" id="dateTo">
                    </div>
                    <button class="filter-btn" onclick="applyFilters()"><i class='bx bx-filter-alt'></i> Apply</button>
                    <button class="filter-btn clear-btn" onclick="clearFilters()"><i class='bx bx-x'></i> Clear</button>
                </div>
            </div>

            <!-- TABLE -->
            <div class="items-table-container">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                    <h3 style="margin:0;">Current Inventory</h3>
                    <button class="filter-btn" onclick="exportCSV()" style="margin:0;">
                        <i class='bx bx-download'></i> Export CSV
                    </button>
                </div>
                <div style="overflow-x:auto;">
                    <table id="inventoryTable">
                        <thead>
                            <tr>
                                <th>Product Code</th>
                                <th>Item Name</th>
                                <th>Category</th>
                                <th>Location</th>
                                <th>Status</th>
                                <th>Date Found</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <script src="admin-state.js"></script>
    <script>
    /* ── INIT ─────────────────────────────── */
    requireAuth();

    let allItems = [];
    let filtered = [];
    let pendingArchiveId = null;
    let pendingClaimId   = null;
    let currentPanelId   = null;

    function init() {
        loadState();
        document.getElementById('sidebarMount').outerHTML = renderSidebar('admin.html');
        document.getElementById('navbarMount').outerHTML  = renderNavbar('admin.html');
        refresh();
    }

    function refresh() {
        allItems = getItems();
        renderStats();
        applyFilters();
    }

    /* ── STATS ────────────────────────────── */
    function renderStats() {
        const total     = allItems.length;
        const claimed   = allItems.filter(i => i.status === 'Claimed').length;
        const unclaimed = total - claimed;
        const rate      = total > 0 ? Math.round((claimed / total) * 100) : 0;

        document.getElementById('statBoxes').innerHTML = `
            <div class="stat-box blue">
                <div class="label">Total Items</div>
                <div class="value">${total}</div>
            </div>
            <div class="stat-box">
                <div class="label">Unclaimed</div>
                <div class="value">${unclaimed}</div>
            </div>
            <div class="stat-box green">
                <div class="label">Claimed</div>
                <div class="value">${claimed}</div>
            </div>
            <div class="stat-box blue">
                <div class="label">Claim Rate</div>
                <div class="value">${rate}%</div>
            </div>
        `;
    }

    /* ── FILTERS ──────────────────────────── */
    function applyFilters() {
        const q      = document.getElementById('searchInput').value.trim().toLowerCase();
        const cat    = document.getElementById('catFilter').value;
        const status = document.getElementById('statusFilter').value;
        const from   = document.getElementById('dateFrom').value;
        const to     = document.getElementById('dateTo').value;

        filtered = allItems.filter(item => {
            if (q) {
                const hay = [item.item_name, item.product_code, item.category, item.description, item.found_location].join(' ').toLowerCase();
                if (!hay.includes(q)) return false;
            }
            if (cat    && item.category !== cat)    return false;
            if (status && item.status   !== status) return false;
            if (from   && item.date_found < from)   return false;
            if (to     && item.date_found > to)     return false;
            return true;
        });

        renderTable();
    }

    function clearFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('catFilter').value   = '';
        document.getElementById('statusFilter').value= '';
        document.getElementById('dateFrom').value    = '';
        document.getElementById('dateTo').value      = '';
        applyFilters();
    }

    // Live search
    document.getElementById('searchInput')?.addEventListener('input', applyFilters);

    /* ── TABLE ────────────────────────────── */
    function renderTable() {
        const body = document.getElementById('inventoryBody');
        if (filtered.length === 0) {
            body.innerHTML = `<tr class="empty-row"><td colspan="7">No items found. Try adjusting your filters.</td></tr>`;
            return;
        }
        body.innerHTML = filtered.map(item => {
            const isClaimed = item.status === 'Claimed';
            const pcClass   = isClaimed ? 'claimed' : '';
            return `
            <tr>
                <td><span class="pc-tag ${pcClass}">${esc(item.product_code)}</span></td>
                <td><strong>${esc(item.item_name)}</strong></td>
                <td>${esc(item.category)}</td>
                <td>${esc(item.found_location)}</td>
                <td><span class="badge ${isClaimed ? 'badge-success' : 'badge-warning'}">${esc(item.status)}</span></td>
                <td>${fmtDate(item.date_found)}</td>
                <td>
                    <button class="action-btn view" onclick="openPanel(${item.item_id})">
                        <i class='bx bx-show'></i> View
                    </button>
                    <button class="action-btn delete" style="border:none;cursor:pointer;"
                            onclick="promptArchive(${item.item_id})">
                        <i class='bx bx-archive'></i> Archive
                    </button>
                </td>
            </tr>`;
        }).join('');
    }

    /* ── DETAIL PANEL ─────────────────────── */
    function openPanel(id) {
        const item = allItems.find(i => i.item_id == id);
        if (!item) return;
        currentPanelId = id;
        const isClaimed = item.status === 'Claimed';

        document.getElementById('panelTitle').textContent = item.item_name;

        document.getElementById('panelImgWrap').innerHTML = `
            <img src="${item.image}" alt="${esc(item.item_name)}"
                 onerror="this.src='assets/default/DEF.png'">`;

        document.getElementById('panelBody').innerHTML = `
            <div class="panel-row">
                <label>Product Code</label>
                <p><span class="pc-tag ${isClaimed ? 'claimed' : ''}">${esc(item.product_code)}</span></p>
            </div>
            <div class="panel-row">
                <label>Status</label>
                <p><span class="badge ${isClaimed ? 'badge-success' : 'badge-warning'}">${esc(item.status)}</span></p>
            </div>
            <div class="panel-row">
                <label>Category</label>
                <p>${esc(item.category)}</p>
            </div>
            <div class="panel-row">
                <label>Found Location</label>
                <p>${esc(item.found_location)}</p>
            </div>
            <div class="panel-row">
                <label>Date Found</label>
                <p>${fmtDate(item.date_found)}</p>
            </div>
            ${isClaimed && item.claimer_name ? `
            <div class="panel-row">
                <label>Claimed By</label>
                <p>${esc(item.claimer_name)} (${esc(item.claimer_id || '—')})</p>
            </div>` : ''}
            <div class="panel-row">
                <label>Description</label>
                <p>${esc(item.description)}</p>
            </div>
            <div class="panel-actions">
                <a href="add_item.html?edit=${item.item_id}" class="panel-btn edit">
                    <i class='bx bx-edit'></i> Edit Item
                </a>
                ${isClaimed
                    ? `<button class="panel-btn unclaim" onclick="doUnclaim(${item.item_id})">
                           <i class='bx bx-x'></i> Mark as Unclaimed
                       </button>`
                    : `<button class="panel-btn claim" onclick="promptClaim(${item.item_id})">
                           <i class='bx bx-check'></i> Mark as Claimed
                       </button>`
                }
                <button class="panel-btn archive" onclick="promptArchive(${item.item_id})">
                    <i class='bx bx-archive'></i> Archive Item
                </button>
            </div>
        `;

        document.getElementById('detailPanel').classList.add('open');
        document.getElementById('panelOverlay').classList.add('open');
    }

    function closePanel() {
        document.getElementById('detailPanel').classList.remove('open');
        document.getElementById('panelOverlay').classList.remove('open');
        currentPanelId = null;
    }

    /* ── CLAIM ────────────────────────────── */
    function promptClaim(id) {
        pendingClaimId = id;
        document.getElementById('claimerName').value = '';
        document.getElementById('claimerId').value   = '';
        document.getElementById('claimModal').style.display = 'block';
        setTimeout(() => document.getElementById('claimerName').focus(), 100);

        document.getElementById('claimSubmitBtn').onclick = () => {
            const name = document.getElementById('claimerName').value.trim();
            const sid  = document.getElementById('claimerId').value.trim();
            if (!name) { toast('Please enter the claimer name.', 'error'); return; }
            if (!sid)  { toast('Please enter the Student/Staff ID.', 'error'); return; }
            markClaimed(pendingClaimId, name, sid);
            closeClaimModal();
            closePanel();
            refresh();
            toast(`✓ Item marked as claimed by ${name}.`, 'success');
        };
    }

    function closeClaimModal() {
        document.getElementById('claimModal').style.display = 'none';
        pendingClaimId = null;
    }

    function doUnclaim(id) {
        if (!confirm('Mark this item as Unclaimed?')) return;
        markUnclaimed(id);
        closePanel();
        refresh();
        toast('Item marked as Unclaimed.', 'info');
    }

    /* ── ARCHIVE ──────────────────────────── */
    function promptArchive(id) {
        pendingArchiveId = id;
        document.getElementById('archiveReason').value = '';
        document.getElementById('archiveModal').style.display = 'block';

        document.getElementById('archiveSubmitBtn').onclick = () => {
            const reason = document.getElementById('archiveReason').value.trim();
            if (!reason) { toast('Please provide a reason for archiving.', 'error'); return; }
            archiveItem(pendingArchiveId, reason);
            closeArchiveModal();
            closePanel();
            refresh();
            toast('Item has been archived.', 'warning');
        };
    }

    function closeArchiveModal() {
        document.getElementById('archiveModal').style.display = 'none';
        pendingArchiveId = null;
    }

    /* ── EXPORT CSV ───────────────────────── */
    function exportCSV() {
        const headers = ['Product Code','Item Name','Category','Location','Status','Date Found','Description'];
        const rows = filtered.map(i => [
            i.product_code, i.item_name, i.category, i.found_location,
            i.status, i.date_found, `"${i.description.replace(/"/g,'""')}"`
        ]);
        const csv  = [headers, ...rows].map(r => r.join(',')).join('\n');
        const link = document.createElement('a');
        link.href  = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
        link.download = `claimit_inventory_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
        toast('CSV exported!', 'info');
    }

    /* ── CLOSE MODALS ON OUTSIDE CLICK ───── */
    window.onclick = e => {
        if (e.target.id === 'archiveModal') closeArchiveModal();
        if (e.target.id === 'claimModal')   closeClaimModal();
    };

    /* ── UTILS ────────────────────────────── */
    function esc(s) {
        return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmtDate(d) {
        if (!d) return '—';
        return new Date(d + 'T00:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
    }

    init();
    </script>
</body>
</html>
