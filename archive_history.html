<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive &amp; History | ClaimIT</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .navbar-app-logo{width:38px;height:38px;object-fit:contain;}
        .navbar-title-sub{color:#003d7a;font-weight:700;}
        .logout-btn{background:none;border:none;color:#d9242e;font-size:20px;cursor:pointer;padding:6px;border-radius:6px;}
        .logout-btn:hover{background:#f8d7da;}
        .admin_name{color:#333;font-weight:600;font-size:14px;margin-right:8px;}
        .navbar-profile{display:flex;align-items:center;}

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 18px;
        }
        .stat-card {
            background:white; padding:20px 22px; border-radius:12px;
            box-shadow:0 2px 8px rgba(0,61,122,0.08); border-top:4px solid #6c757d;
        }
        .stat-card.red   { border-top-color: #d9242e; }
        .stat-card.green { border-top-color: #28a745; }
        .stat-card .label { font-size:11px; color:#888; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
        .stat-card .val   { font-size:30px; font-weight:800; color:#003d7a; margin-top:4px; }

        .section-block {
            background:white; border-radius:12px;
            box-shadow:0 2px 8px rgba(0,61,122,0.08);
            margin-bottom:28px; overflow:hidden;
        }
        .section-head {
            display:flex; justify-content:space-between; align-items:center;
            padding:18px 24px; background:#f8f9fa; border-bottom:2px solid #f0f5ff;
        }
        .section-head h3 { color:#003d7a; font-size:16px; font-weight:800; margin:0; }
        .section-body { padding:20px 24px; }

        .badge { display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; }
        .badge-success { background:#dcfce7; color:#1a7f37; border:1px solid #bbf7d0; }
        .badge-warning { background:#fff0f0; color:#d9242e; border:1px solid #ffd0d2; }
        .badge-archive { background:#f0f0f0; color:#555; border:1px solid #ddd; }

        .pc-tag { font-family:monospace; font-size:11px; font-weight:700; padding:2px 7px; border-radius:4px; background:#f0f0f0; color:#555; border:1px solid #ddd; }

        /* reason tooltip */
        .reason-cell {
            max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
            cursor:pointer; font-size:13px; color:#555;
            border-left:3px solid #d9242e; padding-left:8px;
        }
        .reason-cell:hover { color:#003d7a; }

        /* bar chart */
        .bar-wrap { display:flex; flex-direction:column; gap:10px; }
        .bar-row  { display:flex; align-items:center; gap:12px; }
        .bar-label{ width:130px; font-size:12px; font-weight:600; color:#333; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .bar-track{ flex:1; background:#f0f5ff; border-radius:20px; height:18px; overflow:hidden; }
        .bar-fill { height:100%; border-radius:20px; background:linear-gradient(135deg,#6c757d,#495057); transition:width 0.6s ease; }
        .bar-count{ font-size:12px; font-weight:700; color:#333; width:30px; text-align:right; flex-shrink:0; }
    </style>
</head>
<body>
    <div id="sidebarMount"></div>
    <div id="navbarMount"></div>

    <!-- Restore confirm modal -->
    <div id="restoreModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Restore Item</h2>
                <button class="modal-close" onclick="closeRestoreModal()"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body">
                <p id="restoreMsg">Restore this item back to the main inventory?</p>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeRestoreModal()">Cancel</button>
                <button class="btn-archive" id="restoreConfirmBtn"
                        style="background:linear-gradient(135deg,#003d7a,#002857);">
                    <i class='bx bx-undo'></i> Restore Item
                </button>
            </div>
        </div>
    </div>

    <section class="home-section">
        <div class="home-content">
            <h2 style="color:#003d7a;margin-bottom:24px;font-size:22px;">Archive &amp; History</h2>

            <!-- OVERVIEW STATS -->
            <div class="section-block">
                <div class="section-head"><h3>Archive Overview</h3></div>
                <div class="section-body">
                    <div class="stat-grid" id="archiveStats"></div>
                </div>
            </div>

            <!-- CATEGORY BREAKDOWN -->
            <div class="section-block">
                <div class="section-head"><h3>Archived Items by Category</h3></div>
                <div class="section-body">
                    <div class="bar-wrap" id="archiveBars"></div>
                    <br>
                    <div style="overflow-x:auto;">
                        <table>
                            <thead>
                                <tr><th>Category</th><th>Count</th><th>% of Archive</th></tr>
                            </thead>
                            <tbody id="archiveCatBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- FILTERS -->
            <div class="filter-section" style="margin-bottom:20px;">
                <h3>Filters</h3>
                <div class="filter-row">
                    <div class="filter-group">
                        <label>Search</label>
                        <input type="text" id="archiveSearch" placeholder="Name, code, category…"
                               style="padding:11px 13px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;">
                    </div>
                    <div class="filter-group">
                        <label>Category</label>
                        <select id="archiveCatFilter">
                            <option value="">All Categories</option>
                            <option>Electronics</option><option>Clothing</option>
                            <option>Accessories</option><option>Books</option>
                            <option>IDs/Cards</option><option>Bags</option>
                            <option>School Supplies</option><option>Sports Equipment</option>
                            <option>Personal Items</option><option>Other</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>From Date</label>
                        <input type="date" id="archiveFrom">
                    </div>
                    <div class="filter-group">
                        <label>To Date</label>
                        <input type="date" id="archiveTo">
                    </div>
                    <button class="filter-btn" onclick="applyFilters()"><i class='bx bx-filter-alt'></i> Apply</button>
                    <button class="filter-btn clear-btn" onclick="clearFilters()"><i class='bx bx-x'></i> Clear</button>
                </div>
            </div>

            <!-- ARCHIVED TABLE -->
            <div class="items-table-container">
                <h3>Archived Items</h3>
                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Product Code</th>
                                <th>Item Name</th>
                                <th>Category</th>
                                <th>Status</th>
                                <th>Date Found</th>
                                <th>Reason for Archive</th>
                                <th>Archived Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="archiveTableBody"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </section>

    <script src="admin-state.js"></script>
    <script>
    requireAuth();
    let archiveItems = [];
    let filtered     = [];

    async function init() {
        await loadState();
        document.getElementById('sidebarMount').outerHTML = renderSidebar('archive_history.html');
        document.getElementById('navbarMount').outerHTML  = renderNavbar('archive_history.html');
        refresh();
    }

    function refresh() {
        archiveItems = getArchive();
        renderStats();
        renderCategoryBreakdown();
        applyFilters();
    }

    /* ── STATS ────────────────────────────── */
    function renderStats() {
        const total     = archiveItems.length;
        const claimed   = archiveItems.filter(i => i.status === 'Claimed').length;
        const unclaimed = total - claimed;
        document.getElementById('archiveStats').innerHTML = `
            <div class="stat-card"><div class="label">Total Archived</div><div class="val">${total}</div></div>
            <div class="stat-card green"><div class="label">Claimed &amp; Archived</div><div class="val">${claimed}</div></div>
            <div class="stat-card red"><div class="label">Unclaimed &amp; Archived</div><div class="val">${unclaimed}</div></div>
        `;
    }

    /* ── CATEGORY BARS ────────────────────── */
    function renderCategoryBreakdown() {
        const cats = {};
        archiveItems.forEach(i => { cats[i.category] = (cats[i.category] || 0) + 1; });
        const sorted = Object.entries(cats).sort((a,b) => b[1]-a[1]);
        const total  = archiveItems.length || 1;
        const max    = sorted[0]?.[1] || 1;

        document.getElementById('archiveBars').innerHTML = sorted.length
            ? sorted.map(([cat, count]) => `
                <div class="bar-row">
                    <span class="bar-label" title="${esc(cat)}">${esc(cat)}</span>
                    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/max*100)}%"></div></div>
                    <span class="bar-count">${count}</span>
                </div>`).join('')
            : '<p style="color:#aaa;font-size:13px;">No archived items yet.</p>';

        document.getElementById('archiveCatBody').innerHTML = sorted.length
            ? sorted.map(([cat, count]) => `
                <tr>
                    <td><strong>${esc(cat)}</strong></td>
                    <td>${count}</td>
                    <td><strong>${Math.round(count/total*100)}%</strong></td>
                </tr>`).join('')
            : `<tr><td colspan="3" style="text-align:center;color:#aaa;padding:30px;">No archived items.</td></tr>`;
    }

    /* ── FILTERS ──────────────────────────── */
    function applyFilters() {
        const q    = document.getElementById('archiveSearch').value.trim().toLowerCase();
        const cat  = document.getElementById('archiveCatFilter').value;
        const from = document.getElementById('archiveFrom').value;
        const to   = document.getElementById('archiveTo').value;

        filtered = archiveItems.filter(i => {
            if (q) {
                const hay = [i.item_name, i.product_code, i.category, i.reason_for_archive || ''].join(' ').toLowerCase();
                if (!hay.includes(q)) return false;
            }
            if (cat  && i.category   !== cat)  return false;
            if (from && i.date_found  < from)  return false;
            if (to   && i.date_found  > to)    return false;
            return true;
        });
        renderTable();
    }

    function clearFilters() {
        document.getElementById('archiveSearch').value    = '';
        document.getElementById('archiveCatFilter').value = '';
        document.getElementById('archiveFrom').value      = '';
        document.getElementById('archiveTo').value        = '';
        applyFilters();
    }

    document.getElementById('archiveSearch')?.addEventListener('input', applyFilters);

    /* ── TABLE ────────────────────────────── */
    function renderTable() {
        const body = document.getElementById('archiveTableBody');
        if (filtered.length === 0) {
            body.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#aaa;padding:40px;font-style:italic;">No archived items found.</td></tr>`;
            return;
        }
        body.innerHTML = filtered.map(item => {
            const isClaimed = item.status === 'Claimed';
            const reason    = item.reason_for_archive || 'No reason provided';
            const short     = reason.length > 40 ? reason.slice(0,40) + '…' : reason;
            return `<tr>
                <td><span class="pc-tag">${esc(item.product_code)}</span></td>
                <td><strong>${esc(item.item_name)}</strong></td>
                <td>${esc(item.category)}</td>
                <td><span class="badge ${isClaimed ? 'badge-success' : 'badge-warning'}">${esc(item.status)}</span></td>
                <td>${fmtDate(item.date_found)}</td>
                <td>
                    <span class="reason-cell" title="${esc(reason)}">${esc(short)}</span>
                </td>
                <td>${fmtDate(item.archived_at)}</td>
                <td>
                    <button class="action-btn view" style="border:none;cursor:pointer;"
                            onclick="promptRestore(${item.archive_id}, '${esc(item.item_name)}')">
                        <i class='bx bx-undo'></i> Restore
                    </button>
                </td>
            </tr>`;
        }).join('');
    }

    /* ── RESTORE ──────────────────────────── */
    function promptRestore(archiveId, name) {
        document.getElementById('restoreMsg').innerHTML =
            `Restore <strong>${esc(name)}</strong> back to the main inventory?`;
        document.getElementById('restoreModal').style.display = 'block';

        document.getElementById('restoreConfirmBtn').onclick = () => {
            restoreItem(archiveId);
            closeRestoreModal();
            refresh();
            toast(`✓ "${name}" has been restored to inventory.`, 'success');
        };
    }

    function closeRestoreModal() {
        document.getElementById('restoreModal').style.display = 'none';
    }

    window.onclick = e => {
        if (e.target.id === 'restoreModal') closeRestoreModal();
    };

    /* ── UTILS ────────────────────────────── */
    function fmtDate(d) {
        if (!d) return '—';
        return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    }
    function esc(s) {
        return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
    </script>
</body>
</html>
