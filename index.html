<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClaimIT | Listings</title>
    <link rel="icon" type="image/png" href="assets/logo/app_logo.png">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── RESET ── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', 'Segoe UI', sans-serif; background: #f8f9fa; color: #333; }

        /* ── NAVBAR ── */
        .navbar {
            background: white;
            box-shadow: 0 2px 8px rgba(0,61,122,0.1);
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 1000; height: 66px;
        }
        .navbar-inner {
            max-width: 1280px; margin: 0 auto;
            padding: 0 30px; height: 100%;
            display: flex; align-items: center; justify-content: space-between;
        }
        .navbar-brand {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none;
        }
        .navbar-brand img {
            width: 40px; height: 40px; object-fit: contain;
        }
        .brand-text { font-size: 22px; font-weight: 800; color: #d9242e; letter-spacing: 0.5px; }
        .brand-text span { color: #003d7a; }
        .brand-sub { font-size: 12px !important; font-weight: 500; letter-spacing: 0; color: #7a9cc5 !important; }

        .unclaimed-badge {
            display: flex; align-items: center; gap: 6px;
            background: #f0f5ff; color: #003d7a;
            font-size: 13px; font-weight: 700;
            padding: 7px 16px; border-radius: 20px;
            border: 1px solid #d0dff5;
        }

        /* ── HERO ── */
        .hero {
            background: linear-gradient(135deg, #d9242e 0%, #b71b24 100%);
            color: white; text-align: center;
            padding: 90px 20px 55px;
            margin-top: 66px;
            position: relative; overflow: hidden;
        }
        .hero::before, .hero::after {
            content: ''; position: absolute; border-radius: 50%;
            background: rgba(255,255,255,0.05);
        }
        .hero::before { width: 320px; height: 320px; top: -80px; right: -60px; }
        .hero::after  { width: 240px; height: 240px; bottom: -70px; left: -40px; }
        .hero h1 { font-size: 48px; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; position: relative; z-index: 1; }
        .hero p  { font-size: 17px; color: rgba(255,255,255,0.88); font-weight: 500; position: relative; z-index: 1; }
        .hero em { display: block; font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 8px; font-style: italic; }

        /* ── FILTER CARD ── */
        .filter-wrap { padding: 28px 20px 10px; }
        .filter-card {
            max-width: 1280px; margin: 0 auto;
            background: white; border-radius: 14px;
            padding: 24px 28px;
            box-shadow: 0 2px 10px rgba(0,61,122,0.08);
        }
        .filter-card h3 { color: #003d7a; font-size: 16px; font-weight: 700; margin-bottom: 16px; }

        .search-wrap { position: relative; margin-bottom: 16px; }
        .search-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #bbb; font-size: 20px; pointer-events: none; }
        .search-wrap input {
            width: 100%; padding: 13px 14px 13px 46px;
            border: 2px solid #e8e8e8; border-radius: 10px;
            font-size: 14px; font-family: inherit; color: #333;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-wrap input:focus { outline: none; border-color: #d9242e; box-shadow: 0 0 0 3px rgba(217,36,46,0.1); }

        .filter-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .filter-row label { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; color: #003d7a; margin-bottom: 6px; }
        .filter-row select, .filter-row input[type="date"] {
            width: 100%; padding: 10px 12px;
            border: 2px solid #e8e8e8; border-radius: 8px;
            font-size: 13px; font-family: inherit; color: #333;
        }
        .filter-row select:focus, .filter-row input[type="date"]:focus { outline: none; border-color: #d9242e; }

        .filter-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-red, .btn-gray {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 11px 22px; border: none; border-radius: 8px;
            font-size: 13px; font-weight: 700; cursor: pointer;
            font-family: inherit; text-transform: uppercase; letter-spacing: 0.4px;
            transition: opacity 0.2s, transform 0.15s; white-space: nowrap;
        }
        .btn-red  { background: linear-gradient(135deg, #d9242e, #c41e26); color: white; }
        .btn-gray { background: #6c757d; color: white; }
        .btn-red:hover, .btn-gray:hover { opacity: 0.88; transform: translateY(-1px); }

        /* ── CATALOG ── */
        .catalog { padding: 20px 20px 60px; }
        .catalog-inner { max-width: 1280px; margin: 0 auto; }
        .results-bar { margin-bottom: 18px; font-size: 13px; color: #666; font-weight: 500; }
        .results-bar strong { color: #003d7a; }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
            gap: 22px;
        }

        /* ── CARD ── */
        .item-card {
            background: white; border-radius: 12px; overflow: hidden;
            border: 1px solid #eef0f4;
            box-shadow: 0 2px 8px rgba(0,61,122,0.07);
            cursor: pointer; display: flex; flex-direction: column;
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }
        .item-card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(0,61,122,0.13); }
        .item-card.claimed-card { border-color: #bbf7d0; }
        .item-card.claimed-card:hover { box-shadow: 0 10px 28px rgba(40,167,69,0.13); }

        .card-img { position: relative; height: 220px; background: #eef2f7; overflow: hidden; flex-shrink: 0; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s ease; }
        .item-card:hover .card-img img { transform: scale(1.04); }
        .card-img img.placeholder { object-fit: contain; padding: 20px; }
        /* Force DEF and CONF to same consistent size */
        .card-img img[src*="DEF.png"],
        .card-img img[src*="CONF.png"] {
            object-fit: contain;
            padding: 20px;
            width: 100%;
            height: 100%;
        }

        .status-bar { position: absolute; top: 0; left: 0; right: 0; height: 4px; z-index: 2; }
        .status-bar.unclaimed { background: #d9242e; }
        .status-bar.claimed   { background: #22c55e; }

        .card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; flex: 1; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
        .card-name {
            font-size: 14px; font-weight: 700; color: #003d7a; line-height: 1.3; flex: 1;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .claimed-card .card-name { color: #1a7f37; }
        .card-code {
            font-size: 10px; font-weight: 700; font-family: monospace;
            padding: 2px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
        }
        .card-code.unclaimed { color: #d9242e; background: #fff0f0; border: 1px solid #ffd0d2; }
        .card-code.claimed   { color: #1a7f37; background: #dcfce7; border: 1px solid #bbf7d0; }

        .card-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
        .card-meta span { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; color: #777; font-weight: 500; }
        .card-meta span i { font-size: 13px; color: #003d7a; opacity: 0.65; }

        .card-desc {
            font-size: 12px; color: #777; line-height: 1.55; flex: 1;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
            overflow: hidden; margin-bottom: 12px;
        }
        .card-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 10px; border-top: 1px solid #f0f2f5; margin-top: auto;
        }
        .card-date { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #aaa; font-weight: 500; }
        .card-date i { font-size: 12px; color: #d9242e; }

        .status-dot { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; }
        .status-dot::before { content: ''; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .status-dot.unclaimed { color: #d9242e; }
        .status-dot.unclaimed::before { background: #d9242e; box-shadow: 0 0 0 2px rgba(217,36,46,0.18); }
        .status-dot.claimed   { color: #1a7f37; }
        .status-dot.claimed::before   { background: #22c55e; box-shadow: 0 0 0 2px rgba(34,197,94,0.18); }

        /* ── NO RESULTS ── */
        .no-results {
            display: none; text-align: center; padding: 60px 30px;
            background: white; border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0,61,122,0.07);
        }
        .no-results i  { font-size: 60px; color: #d9242e; opacity: 0.4; display: block; margin-bottom: 16px; }
        .no-results h3 { font-size: 22px; color: #003d7a; margin-bottom: 8px; }
        .no-results p  { font-size: 14px; color: #999; margin-bottom: 24px; }
        .no-results-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 11px 26px; border-radius: 8px; border: none;
            background: linear-gradient(135deg, #d9242e, #c41e26);
            color: white; font-size: 13px; font-weight: 700;
            font-family: inherit; text-transform: uppercase; letter-spacing: 0.4px;
            cursor: pointer; transition: opacity 0.2s, transform 0.15s;
            width: fit-content; margin: 0 auto;
        }
        .no-results-btn:hover { opacity: 0.88; transform: translateY(-1px); }

        /* ── PAGINATION ── */
        .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; margin-top: 36px; }
        .pg-btn {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 9px 16px; background: white; color: #003d7a;
            border: 2px solid #e0e0e0; border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s;
        }
        .pg-btn:hover:not(:disabled) { border-color: #d9242e; color: #d9242e; }
        .pg-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .pg-num {
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer;
            border: 2px solid #e0e0e0; background: white; color: #003d7a; font-family: inherit; transition: all 0.2s;
        }
        .pg-num:hover, .pg-num.active { background: linear-gradient(135deg,#d9242e,#c41e26); color: white; border-color: #d9242e; }
        .pg-ellipsis { color: #bbb; font-weight: 700; padding: 0 2px; align-self: center; }

        /* ── MODAL ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 3000;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-box {
            background: white; border-radius: 16px; width: 100%; max-width: 760px;
            max-height: 88vh; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 24px 64px rgba(0,0,0,0.22); border-top: 5px solid #d9242e;
            animation: slideIn 0.25s ease;
        }
        .modal-box.claimed { border-top-color: #22c55e; box-shadow: 0 24px 64px rgba(40,167,69,0.15); }
        @keyframes slideIn { from { transform: translateY(-28px) scale(0.98); opacity:0; } to { transform: translateY(0) scale(1); opacity:1; } }

        .modal-head {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 18px 22px 14px; background: #f8f9fa;
            border-bottom: 1px solid #eee; flex-shrink: 0;
        }
        .modal-head.claimed { background: #f0fdf4; border-bottom-color: #bbf7d0; }
        .modal-head-left { display: flex; flex-direction: column; gap: 6px; }
        .modal-head h2 { font-size: 18px; font-weight: 800; color: #003d7a; line-height: 1.2; }
        .modal-head.claimed h2 { color: #1a7f37; }

        .modal-tags { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .m-code { font-size: 11px; font-weight: 700; font-family: monospace; padding: 3px 9px; border-radius: 5px; }
        .m-code.unclaimed { color: #d9242e; background: #fff0f0; border: 1px solid #ffd0d2; }
        .m-code.claimed   { color: #1a7f37; background: #dcfce7; border: 1px solid #bbf7d0; }
        .m-status {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
        }
        .m-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
        .m-status.unclaimed { background: #fff0f0; color: #d9242e; border: 1px solid #ffd0d2; }
        .m-status.unclaimed::before { background: #d9242e; }
        .m-status.claimed   { background: #dcfce7; color: #1a7f37; border: 1px solid #bbf7d0; }
        .m-status.claimed::before   { background: #22c55e; }

        .modal-close-btn {
            background: none; border: none; color: #aaa; font-size: 22px; cursor: pointer;
            width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
            border-radius: 7px; flex-shrink: 0; transition: all 0.15s;
        }
        .modal-close-btn:hover { color: #d9242e; background: #fff0f0; }

        .modal-body { display: flex; flex-direction: column; overflow-y: auto; flex: 1; }
        .modal-img {
            width: 100%; height: 340px; flex-shrink: 0; background: #eef2f7; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-img img {
            width: 100%; height: 100%; object-fit: contain; padding: 14px;
            cursor: zoom-in;
            transition: transform 0.1s ease;
            transform-origin: var(--zoom-x, 50%) var(--zoom-y, 50%);
        }
        .modal-img img.zoomed {
            transform: scale(2.2);
            cursor: zoom-out;
        }
        .modal-info { padding: 18px 22px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px 22px; }
        .info-row { display: flex; flex-direction: column; gap: 3px; }
        .info-row.full { grid-column: 1 / -1; }
        .info-row label { font-size: 10px; font-weight: 700; color: #003d7a; text-transform: uppercase; letter-spacing: 1px; }
        .info-row p { font-size: 13px; color: #333; line-height: 1.5; margin: 0; }
        .modal-foot {
            padding: 12px 22px; border-top: 1px solid #eee; background: #f8f9fa;
            font-size: 12px; color: #999; font-style: italic; flex-shrink: 0;
            display: flex; align-items: center; gap: 7px;
        }
        .modal-foot.unclaimed { background: #fff0f0; border-top-color: #ffd0d2; color: #d9242e; font-style: normal; font-weight: 600; }
        .modal-foot.claimed   { background: #f0fdf4; border-top-color: #bbf7d0; color: #1a7f37; font-style: normal; font-weight: 600; }

        /* ── LOADING ── */
        .loading-screen {
            position: fixed; inset: 0; background: rgba(248,249,250,0.96);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; gap: 16px;
        }
        .spinner { width: 46px; height: 46px; border-radius: 50%; border: 4px solid #f0f0f0; border-top-color: #d9242e; animation: spin 0.8s linear infinite; }
        .loading-screen p { color: #003d7a; font-weight: 700; font-size: 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .hero h1 { font-size: 32px; }
            .hero p  { font-size: 15px; }
            .hero    { padding: 82px 20px 42px; }
            .navbar-inner { padding: 0 16px; }
            .brand-text { font-size: 18px; }
            .items-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
            .modal-info { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            .hero h1 { font-size: 26px; }
            .filter-row { grid-template-columns: 1fr; }
            .items-grid { grid-template-columns: 1fr; }
            .filter-actions { flex-direction: column; }
            .filter-actions .btn-red,
            .filter-actions .btn-gray { width: 100%; justify-content: center; }
            .unclaimed-badge { display: none; }
        }
    </style>
</head>
<body>

    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <p>Loading catalog…</p>
    </div>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-brand">
                <img src="assets/logo/app_logo.png" alt="ClaimIT" onerror="this.style.display='none'">
                <span class="brand-text">ClaimIT <span class="brand-sub">a COB-001 Project</span></span>
            </a>
            <div class="unclaimed-badge">
                <i class='bx bx-package'></i>
                <span id="unclaimedCount">—</span> Items Unclaimed
            </div>
        </div>
    </nav>

    <section class="hero">
        <h1>Lost Something?</h1>
        <p>Browse our catalog of found items and reclaim what's yours</p>
        <em>Lost it? Don't panic. <strong>ClaimIT.</strong></em>
    </section>

    <div class="filter-wrap">
        <div class="filter-card">
            <h3>Find Your Item</h3>
            <div class="search-wrap">
                <i class='bx bx-search'></i>
                <input type="text" id="searchInput" placeholder="Search by item name, description, or product code…">
            </div>
            <div class="filter-row">
                <div>
                    <label><i class='bx bx-category'></i> Category</label>
                    <select id="categoryFilter">
                        <option value="">All Categories</option>
                        <option>Electronics</option><option>Clothing</option>
                        <option>Accessories</option><option>Books</option>
                        <option>IDs/Cards</option><option>Bags</option>
                        <option>School Supplies</option><option>Sports Equipment</option>
                        <option>Personal Items</option><option>Other</option>
                    </select>
                </div>
                <div>
                    <label><i class='bx bx-info-circle'></i> Status</label>
                    <select id="statusFilter">
                        <option value="Unclaimed">Unclaimed</option>
                        <option value="">All Status</option>
                        <option value="Claimed">Claimed</option>
                    </select>
                </div>
                <div>
                    <label><i class='bx bx-calendar'></i> From Date</label>
                    <input type="date" id="dateFrom">
                </div>
                <div>
                    <label><i class='bx bx-calendar'></i> To Date</label>
                    <input type="date" id="dateTo">
                </div>
            </div>
            <div class="filter-actions">
                <button class="btn-red" id="applyBtn"><i class='bx bx-filter-alt'></i> Apply Filters</button>
                <button class="btn-gray" id="clearBtn"><i class='bx bx-x'></i> Clear All</button>
            </div>
        </div>
    </div>

    <div class="catalog">
        <div class="catalog-inner">
            <p class="results-bar" id="resultsBar">Loading…</p>
            <div class="items-grid" id="itemsGrid"></div>

            <div class="no-results" id="noResults">
                <i class='bx bx-search-alt'></i>
                <h3>No Items Found</h3>
                <p>Try adjusting your filters or search criteria.</p>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <div class="modal-overlay" id="itemModal">
        <div class="modal-box" id="modalBox">
            <div class="modal-head" id="modalHead">
                <div class="modal-head-left">
                    <h2 id="modalTitle">—</h2>
                    <div class="modal-tags" id="modalTags"></div>
                </div>
                <button class="modal-close-btn" id="modalClose"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body">
                <div class="modal-img" id="modalImg"></div>
                <div class="modal-info" id="modalInfo"></div>
            </div>
            <div class="modal-foot" id="modalFoot"></div>
        </div>
    </div>

    <script>
    const PER_PAGE  = 12;
    const CONF_CATS = ['IDs/Cards'];
    let allItems = [], filtered = [], currentPage = 1;

    async function boot() {
        try {
            const res  = await fetch('data.json');
            if (!res.ok) throw new Error();
            const data = await res.json();
            allItems   = data.items;
            document.getElementById('unclaimedCount').textContent =
                allItems.filter(i => i.status === 'Unclaimed').length;
            applyFilters();
        } catch {
            document.getElementById('loadingScreen').innerHTML =
                '<p style="color:#d9242e;font-weight:700;padding:40px;text-align:center;">⚠ Could not load data.json.</p>';
            return;
        }
        document.getElementById('loadingScreen').style.display = 'none';
    }

    function applyFilters() {
        const q    = document.getElementById('searchInput').value.trim().toLowerCase();
        const cat  = document.getElementById('categoryFilter').value;
        const stat = document.getElementById('statusFilter').value;
        const from = document.getElementById('dateFrom').value;
        const to   = document.getElementById('dateTo').value;

        filtered = allItems.filter(item => {
            if (q) { const hay = [item.item_name, item.description, item.product_code, item.category, item.found_location].join(' ').toLowerCase(); if (!hay.includes(q)) return false; }
            if (cat  && item.category   !== cat)  return false;
            if (stat && item.status     !== stat)  return false;
            if (from && item.date_found  < from)   return false;
            if (to   && item.date_found  > to)     return false;
            return true;
        }).sort((a, b) => b.date_found.localeCompare(a.date_found));

        currentPage = 1;
        render();
    }

    function clearFilters() {
        document.getElementById('searchInput').value    = '';
        document.getElementById('categoryFilter').value = '';
        document.getElementById('statusFilter').value   = 'Unclaimed';
        document.getElementById('dateFrom').value       = '';
        document.getElementById('dateTo').value         = '';
        applyFilters();
    }

    function render() {
        const grid = document.getElementById('itemsGrid');
        const noRes = document.getElementById('noResults');
        const bar   = document.getElementById('resultsBar');
        document.getElementById('pagination').innerHTML = '';
        grid.innerHTML = '';

        if (filtered.length === 0) {
            noRes.style.display = 'block';
            grid.style.display  = 'none';
            bar.innerHTML = 'No items matched your search.';
            return;
        }

        noRes.style.display = 'none';
        grid.style.display  = 'grid';

        const total = Math.ceil(filtered.length / PER_PAGE);
        const start = (currentPage - 1) * PER_PAGE;
        const slice = filtered.slice(start, start + PER_PAGE);

        bar.innerHTML = `Showing <strong>${start+1}–${Math.min(start+PER_PAGE, filtered.length)}</strong> of <strong>${filtered.length}</strong> item${filtered.length!==1?'s':''}`;
        slice.forEach(item => grid.appendChild(buildCard(item)));
        buildPagination(total);
    }

    function getImg(item) {
        return CONF_CATS.includes(item.category) ? 'assets/default/CONF.png' : item.image;
    }

    function buildCard(item) {
        const claimed = item.status === 'Claimed';
        const sc = claimed ? 'claimed' : 'unclaimed';
        const desc = item.description.length > 115 ? item.description.slice(0,115)+'…' : item.description;
        const card = document.createElement('div');
        card.className = 'item-card' + (claimed ? ' claimed-card' : '');
        card.addEventListener('click', () => openModal(item));
        card.innerHTML = `
            <div class="card-img">
                <div class="status-bar ${sc}"></div>
                <img src="${getImg(item)}" alt="${esc(item.item_name)}"
                     class="${CONF_CATS.includes(item.category) ? 'placeholder' : ''}"
                     onerror="this.src='assets/default/DEF.png';this.classList.add('placeholder')">
            </div>
            <div class="card-body">
                <div class="card-header">
                    <h3 class="card-name">${esc(item.item_name)}</h3>
                    <span class="card-code ${sc}">${esc(item.product_code)}</span>
                </div>
                <div class="card-meta">
                    <span><i class='bx bx-category-alt'></i>${esc(item.category)}</span>
                    <span><i class='bx bx-map'></i>${esc(item.found_location)}</span>
                </div>
                <p class="card-desc">${esc(desc)}</p>
                <div class="card-footer">
                    <span class="card-date"><i class='bx bx-time'></i>Found: ${fmtDate(item.date_found)}</span>
                    <span class="status-dot ${sc}">${esc(item.status)}</span>
                </div>
            </div>`;
        return card;
    }

    function buildPagination(total) {
        if (total <= 1) return;
        const pg = document.getElementById('pagination');

        const prev = document.createElement('button');
        prev.className = 'pg-btn'; prev.disabled = currentPage === 1;
        prev.innerHTML = `<i class='bx bx-chevron-left'></i> Prev`;
        prev.addEventListener('click', () => { currentPage--; render(); scrollUp(); });
        pg.appendChild(prev);

        const nums = document.createElement('div');
        nums.style.cssText = 'display:flex;gap:6px;';
        const s = Math.max(1, currentPage-2), e = Math.min(total, currentPage+2);
        if (s > 1) { nums.appendChild(pgNum(1)); if (s > 2) { const el=document.createElement('span'); el.className='pg-ellipsis'; el.textContent='…'; nums.appendChild(el); } }
        for (let p = s; p <= e; p++) nums.appendChild(pgNum(p));
        if (e < total) { if (e < total-1) { const el=document.createElement('span'); el.className='pg-ellipsis'; el.textContent='…'; nums.appendChild(el); } nums.appendChild(pgNum(total)); }
        pg.appendChild(nums);

        const next = document.createElement('button');
        next.className = 'pg-btn'; next.disabled = currentPage === total;
        next.innerHTML = `Next <i class='bx bx-chevron-right'></i>`;
        next.addEventListener('click', () => { currentPage++; render(); scrollUp(); });
        pg.appendChild(next);
    }

    function pgNum(p) {
        const btn = document.createElement('button');
        btn.className = 'pg-num' + (p === currentPage ? ' active' : '');
        btn.textContent = p;
        btn.addEventListener('click', () => { currentPage = p; render(); scrollUp(); });
        return btn;
    }

    function scrollUp() { document.querySelector('.catalog').scrollIntoView({ behavior:'smooth', block:'start' }); }

    function openModal(item) {
        const claimed = item.status === 'Claimed';
        const sc = claimed ? 'claimed' : 'unclaimed';
        document.getElementById('modalBox').className  = 'modal-box'  + (claimed ? ' claimed' : '');
        document.getElementById('modalHead').className = 'modal-head' + (claimed ? ' claimed' : '');
        document.getElementById('modalFoot').className = 'modal-foot' + (claimed ? ' claimed' : ' unclaimed');
        document.getElementById('modalFoot').innerHTML = claimed
            ? `<i class='bx bx-check-circle'></i> This item has already been claimed.`
            : `<i class='bx bx-id-card'></i> Visit the Lost &amp; Found Office to claim this item. Bring your Student ID.`;
        document.getElementById('modalTitle').textContent = item.item_name;
        document.getElementById('modalTags').innerHTML = `
            <span class="m-code ${sc}">${esc(item.product_code)}</span>
            <span class="m-status ${sc}">${esc(item.status)}</span>`;
        document.getElementById('modalImg').innerHTML = `
            <img src="${getImg(item)}" alt="${esc(item.item_name)}" onerror="this.src='assets/default/DEF.png'">`;
        document.getElementById('modalInfo').innerHTML = `
            <div class="info-row"><label>Category</label><p>${esc(item.category)}</p></div>
            <div class="info-row"><label>Found Location</label><p>${esc(item.found_location)}</p></div>
            <div class="info-row"><label>Date Found</label><p>${fmtDate(item.date_found)}</p></div>
            <div class="info-row full"><label>Description</label><p>${esc(item.description)}</p></div>`;
        document.getElementById('itemModal').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        const img = document.querySelector('#modalImg img');
        if (img) { img.classList.remove('zoomed'); img.style.transformOrigin = '50% 50%'; }
        document.getElementById('itemModal').classList.remove('open');
        document.body.style.overflow = '';
    }

    document.getElementById('applyBtn').addEventListener('click', applyFilters);
    document.getElementById('clearBtn').addEventListener('click', clearFilters);
    document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key==='Enter') applyFilters(); });
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('itemModal').addEventListener('click', e => { if (e.target===document.getElementById('itemModal')) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

    // ===== MODAL IMAGE ZOOM =====
    document.getElementById('modalImg').addEventListener('mousemove', function(e) {
        const img = this.querySelector('img');
        if (!img || !img.classList.contains('zoomed')) return;
        const rect = this.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1) + '%';
        const y = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1) + '%';
        img.style.setProperty('--zoom-x', x);
        img.style.setProperty('--zoom-y', y);
        img.style.transformOrigin = x + ' ' + y;
    });

    document.getElementById('modalImg').addEventListener('click', function() {
        const img = this.querySelector('img');
        if (!img) return;
        img.classList.toggle('zoomed');
        if (!img.classList.contains('zoomed')) {
            img.style.transformOrigin = '50% 50%';
        }
    });

    function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function fmtDate(d) { if (!d) return '—'; return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }

    boot();
    </script>
</body>
</html>
